
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

.wrap{
  font-family:'Syne',sans-serif;
  padding:32px 48px 40px;
  display:flex;
  justify-content:center;
}

.pipeline{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:560px;
}

/* vertical pipe line */
.pipe-line{
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:3px;
  transform:translateX(-50%);
  background:var(--color-border-secondary);
  z-index:0;
}
.pipe-line::before{
  content:'';
  position:absolute;
  top:-4px;left:50%;
  transform:translateX(-50%);
  width:9px;height:9px;
  border-radius:50%;
  background:var(--color-border-secondary);
}
.pipe-line::after{
  content:'';
  position:absolute;
  bottom:-9px;left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:10px solid var(--color-border-secondary);
}

/* each stage row */
.stage{
  position:relative;
  z-index:1;
  width:100%;
  display:grid;
  grid-template-columns:1fr 24px 1fr;
  align-items:center;
  column-gap:0;
  padding:18px 0;
}

/* dot on pipe */
.stage-dot{
  width:12px;height:12px;
  border-radius:50%;
  background:var(--color-background-primary);
  border:2px solid var(--color-border-secondary);
  justify-self:center;
  position:relative;
  z-index:2;
}

/* label + icons LEFT side */
.stage-left{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  padding-right:20px;
  gap:10px;
}

/* label + icons RIGHT side */
.stage-right{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  padding-left:20px;
  gap:10px;
}

.stage-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--color-text-tertiary);
}

.icons-row{
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  gap:14px;
}
.stage-left .icons-row{justify-content:flex-end;}
.stage-right .icons-row{justify-content:flex-start;}

/* individual tool */
.tool{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.tool svg{
  width:26px;height:26px;
  fill:var(--color-text-primary);
  transition:fill .15s, transform .15s;
  display:block;
}
.tool:hover svg{
  fill:#2563eb;
  transform:scale(1.15);
}

/* tooltip — floats away from the pipe center */
.tooltip{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-secondary);
  border-radius:8px;
  padding:7px 11px;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  z-index:100;
  white-space:nowrap;
}
.tool:hover .tooltip{opacity:1;}

/* tooltips on left side point further left */
.stage-left .tooltip{
  right:calc(100% + 10px);
  left:auto;
}
/* tooltips on right side point further right */
.stage-right .tooltip{
  left:calc(100% + 10px);
  right:auto;
}

.tt-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;}
.tt-role{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--color-text-tertiary);max-width:160px;white-space:normal;line-height:1.4;}

/* connector stub from dot to content */
.stage-left::after{
  content:'';
  position:absolute;
  right:0; top:50%;
  width:20px; height:1px;
  background:var(--color-border-tertiary);
  transform:translateY(-50%);
  pointer-events:none;
}
.stage-right::before{
  content:'';
  position:absolute;
  left:0; top:50%;
  width:20px; height:1px;
  background:var(--color-border-tertiary);
  transform:translateY(-50%);
  pointer-events:none;
}
</style>

<div class="wrap">
  <div class="pipeline">
    <div class="pipe-line"></div>
    <div id="stages"></div>
  </div>
</div>

  { label:'Cloud & Infra', side:'right', tools:[
    {id:'aws',    name:'AWS',    role:'S3, Redshift, Glue, Lambda'},
    {id:'gcp',    name:'GCP',    role:'GCS, BigQuery, Dataflow'},
    {id:'azure',  name:'Azure',  role:'ADLS, Synapse, Data Factory'},
    {id:'docker', name:'Docker', role:'Containerised pipelines'},
    {id:'k8s',    name:'K8s',    role:'Container orchestration'},
    {id:'git',    name:'Git',    role:'Version control & CI/CD'},
  ]},
  { label:'Visualise',     side:'left',  tools:[
    {id:'tableau', name:'Tableau',  role:'Interactive BI dashboards'},
    {id:'powerbi', name:'Power BI', role:'Microsoft BI & reporting'},
  ]},
];

const stagesEl = document.getElementById('stages');
stagesEl.style.cssText = 'width:100%;display:flex;flex-direction:column;align-items:stretch;position:relative;z-index:1;';

STAGES.forEach(stage => {
  const row = document.createElement('div');
  row.className = 'stage';

  const isLeft = stage.side === 'left';

  // build icons HTML
  const iconsHtml = stage.tools.map(tool => `
    <div class="tool">
      <div class="tooltip">
        <div class="tt-name">${tool.name}</div>
        <div class="tt-role">${tool.role}</div>
      </div>
      ${SVG[tool.id] || ''}
    </div>
  `).join('');

  const contentHtml = `
    <div class="stage-label" style="margin-bottom:6px;">${stage.label}</div>
    <div class="icons-row">${iconsHtml}</div>
  `;

  if (isLeft) {
    row.innerHTML = `
      <div class="stage-left" style="position:relative;">${contentHtml}</div>
      <div class="stage-dot"></div>
      <div></div>
    `;
  } else {
    row.innerHTML = `
      <div></div>
      <div class="stage-dot"></div>
      <div class="stage-right" style="position:relative;">${contentHtml}</div>
    `;
  }

  stagesEl.appendChild(row);
});
</script>
