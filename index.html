<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0c1220;
    --bg2:          #111827;
    --surface:      #1e293b;
    --surface2:     #243044;
    --border:       rgba(51,65,85,0.7);
    --border-blue:  rgba(59,130,246,0.4);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-dim:     #475569;
    --accent:       #3b82f6;
    --accent2:      #60a5fa;
    --accent-cyan:  #22d3ee;
    --mono: 'IBM Plex Mono', monospace;
    /* typography system */
    --font-display: 'Georgia', serif;
    --font-body:    system-ui, -apple-system, sans-serif;
    --font-label:   system-ui, -apple-system, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 29.25px;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── Nav ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent;
    backdrop-filter: none;
    border-bottom: 0.8px solid transparent;
    transition: background 300ms ease, border-color 300ms ease, backdrop-filter 300ms ease;
  }

  /* Full name in Georgia display style */
  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.025em;
    color: #f1f5f9;
    text-decoration: none;
    line-height: 28px;
  }

  .nav-links {
    display: flex;
    gap: 8px;
    list-style: none;
  }

  /* Link style from design system */
  .nav-links a {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #94a3b8;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 9999px;
    transition: color 150ms ease;
  }
  .nav-links a:hover { color: var(--accent2); }

  /* ── Shared layout ── */
  section { padding: 100px 0; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.8px;
    background: var(--border);
    max-width: 60px;
  }

  /* ── Section backgrounds — alternating pattern (very subtle) ── */
  #about    { background: #0c1220; }
  #pipeline { background: #0e1525; }
  #projects { background: #0c1220; }
  #contact  { background: #0e1525; }

  /* display-lg token */
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  /* ── Buttons ── */
  /* Primary: #334155 bg, #60A5FA text, pill, shadow */
  .btn-primary {
    display: inline-block;
    font-family: var(--font-label);
    font-size: 16px;
    font-weight: 500;
    line-height: 24px;
    color: #fff;
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    padding: 12px 32px;
    border-radius: 9999px;
    text-decoration: none;
    border: none;
    box-shadow: 0 0 0 0 rgba(0,0,0,0), 0 0 0 0 rgba(0,0,0,0), rgba(30,58,138,0.5) 0px 10px 15px -3px, rgba(30,58,138,0.5) 0px 4px 6px -4px;
    transition: opacity 150ms ease, transform 150ms cubic-bezier(0.4,0,0.2,1), box-shadow 150ms ease;
    cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Secondary: transparent, #60A5FA text, blue border */
  .btn-secondary {
    display: inline-block;
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #60a5fa;
    background: transparent;
    padding: 8px 24px;
    border-radius: 9999px;
    border: 0.8px solid #3b82f6;
    text-decoration: none;
    transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    cursor: pointer;
  }
  .btn-secondary:hover { background: rgba(59,130,246,0.1); box-shadow: 0 0 0 0 rgba(0,0,0,0), 0 0 0 0 rgba(0,0,0,0), rgba(0,0,0,0.2) 0 1px 2px 0; }

  /* ── Hero ── */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
    padding: 0;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 160px 48px 80px;
    max-width: 620px;
    /* left ~45% like NexusStream, ribbons own the right */
    width: 45%;
    min-width: 300px;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hero-eyebrow::before {
    content: '';
    width: 24px;
    height: 0.8px;
    background: var(--accent2);
    opacity: 0.6;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: transparent;
    background: linear-gradient(135deg, #818cf8 0%, #60a5fa 40%, #22d3ee 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
  }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 400;
    line-height: 29.25px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    max-width: 400px;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── About ── */
  .about-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }

  .about-text p {
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 29.25px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .about-text p strong { color: var(--text-primary); font-weight: 500; }

  .skills-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; margin-top: 48px; }

  .skill-group-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .skill-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  .chip {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 0.8px solid var(--border);
    padding: 4px 16px;
    border-radius: 9999px;
    transition: border-color 150ms ease, color 150ms ease;
    cursor: default;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Pipeline Section ── */

  /* ── Projects ── */

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 32px;
    margin-bottom: 32px;
    justify-content: center;
  }

  .filter-chip {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    padding: 8px 20px;
    border-radius: 9999px;
    border: 0.8px solid var(--border);
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
  }
  .filter-chip:hover { color: var(--accent2); border-color: var(--border-blue); }
  .filter-chip.active {
    background: #334155;
    color: #60a5fa;
    border-color: transparent;
    box-shadow: rgba(0,0,0,0) 0 0 0 0, rgba(0,0,0,0) 0 0 0 0, rgba(0,0,0,0.2) 0 1px 2px 0;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 0.8px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: border-color 200ms cubic-bezier(0.4,0,0.2,1), transform 200ms cubic-bezier(0.4,0,0.2,1), box-shadow 200ms cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-cyan));
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .project-card:hover {
    border-color: var(--border-blue);
    transform: translateY(-3px);
    box-shadow: 0 20px 40px -12px rgba(30,58,138,0.35);
  }
  .project-card:hover::before { opacity: 1; }

  .project-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* display font for project titles */
  .project-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    line-height: 1.3;
  }

  /* body-md for desc */
  .project-desc {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    flex: 1;
  }

  .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .project-card .project-tags { justify-content: center; }

  .project-tag {
    font-family: var(--font-label);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent2);
    background: rgba(59,130,246,0.1);
    border: 0.8px solid rgba(59,130,246,0.2);
    padding: 3px 10px;
    border-radius: 9999px;
  }

  .project-arrow {
    font-size: 18px;
    color: var(--text-dim);
    align-self: flex-end;
    transition: color 200ms ease, transform 200ms ease;
  }
  .project-card:hover .project-arrow { color: var(--accent2); transform: translate(2px,-2px); }

  .project-card.hidden { display: none; }

  /* ── Pagination dots ── */
  .page-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .page-dot {
    width: 9px;
    height: 9px;
    border-radius: 9999px;
    border: 0;
    padding: 0;
    background: var(--surface2);
    cursor: pointer;
    transition: background 180ms ease, transform 180ms ease, width 200ms cubic-bezier(0.4,0,0.2,1);
  }
  .page-dot:hover { background: var(--text-secondary); }
  .page-dot.active {
    background: var(--accent);
    width: 28px;
    box-shadow: 0 0 12px rgba(59,130,246,0.4);
  }
  .page-arrow {
    width: 32px;
    height: 32px;
    border-radius: 9999px;
    border: 0.8px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease, opacity 150ms ease;
  }
  .page-arrow:hover:not(:disabled) {
    background: rgba(59,130,246,0.08);
    color: var(--accent2);
    border-color: var(--border-blue);
  }
  .page-arrow:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Project Modal ── */
  .project-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(8,12,22,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: pm-fade 180ms ease;
  }
  .project-modal {
    position: relative;
    background: var(--surface);
    border: 0.8px solid var(--border-blue);
    border-radius: 16px;
    padding: 40px 40px 36px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
    animation: pm-scale 220ms cubic-bezier(0.4,0,0.2,1);
  }
  .project-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-cyan));
    border-radius: 16px 16px 0 0;
  }
  .project-modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 9999px;
    background: var(--surface2);
    border: 0.8px solid var(--border);
    color: var(--text-secondary);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
  }
  .project-modal-close:hover {
    background: rgba(59,130,246,0.12);
    color: var(--accent2);
    border-color: var(--border-blue);
  }
  .project-modal-title {
    font-family: var(--font-display);
    font-size: clamp(26px, 3vw, 34px);
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    line-height: 1.2;
    margin: 4px 0 16px;
    padding-right: 48px;
  }
  .project-modal-desc {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }
  .project-modal-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin: 8px 0 12px;
  }
  .project-modal-highlights {
    list-style: none;
    padding: 0;
    margin: 0 0 24px;
  }
  .project-modal-highlights li {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text-secondary);
    padding: 7px 0 7px 22px;
    position: relative;
    line-height: 1.6;
  }
  .project-modal-highlights li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 16px;
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: var(--accent);
  }
  @keyframes pm-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pm-scale {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Contact ── */
  #contact { text-align: center; padding: 60px 0; }

  .contact-inner { max-width: 480px; margin: 0 auto; }

  .contact-email {
    font-family: var(--font-display);
    font-size: clamp(22px, 3.5vw, 40px);
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    text-decoration: none;
    display: block;
    margin: 0 0 32px;
    transition: color 150ms ease;
  }
  .contact-email:hover { color: var(--accent2); }

  .contact-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  /* ── Footer ── */
  footer {
    border-top: 0.8px solid var(--border);
    background: #0c1220;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-copy {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { display: none; }
    .hero-content { width: 100%; padding: 120px 24px 60px; }
    .container { padding: 0 24px; }
    section { padding: 72px 0; }
    .projects-grid { grid-template-columns: 1fr; }
    .filter-bar { gap: 6px; }
    .filter-chip { font-size: 13px; padding: 6px 14px; }
    .contact-links { flex-direction: column; align-items: center; }
    footer { padding: 20px 24px; }
  }
  @media (min-width: 769px) and (max-width: 1024px) {
    .hero-content { width: 55%; padding: 140px 40px 60px; }
    .projects-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<!-- Nav -->
<nav id="main-nav">
  <a href="#hero" class="nav-logo" id="nav-name" style="opacity:0;pointer-events:none;transition:opacity 300ms ease;">Denislav Denev</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#pipeline">Stack</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
<script>
  window.addEventListener('scroll', function() {
    var hero = document.getElementById('hero');
    var name = document.getElementById('nav-name');
    var nav  = document.getElementById('main-nav');
    if (!hero || !name) return;
    var past = window.scrollY > hero.offsetHeight * 0.7;
    name.style.opacity = past ? '1' : '0';
    name.style.pointerEvents = past ? 'auto' : 'none';
    nav.style.background = past ? 'rgba(12,18,32,0.85)' : 'transparent';
    nav.style.borderBottomColor = past ? 'rgba(51,65,85,0.7)' : 'transparent';
    nav.style.backdropFilter = past ? 'blur(12px)' : 'none';
  });
</script>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

      streamRefs.current.forEach(el => { if (el) el.style.strokeDashoffset = offset; });
      fastRefs.current.forEach(el =>   { if (el) el.style.strokeDashoffset = offset * 2.5; });
      time += 0.025;
      nodeRefs.current.forEach((el, i) => {
        if (el) el.style.transform = `translateY(${Math.sin(time + i * 2.1) * 7}px)`;
      });
      rafRef.current = requestAnimationFrame(animate);
    }
    animate();
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  const sRef  = (i) => el => { streamRefs.current[i] = el; };

// All filter tags drawn from the pipeline stack — every tool the user can see
// in the pipeline visualisation is also a filter here. We keep pipeline order
// (Ingest → Process → … → Visualise) instead of alphabetising so the chips
// read as a coherent story rather than a flat dictionary.
// Excluded: tools that exist in the pipeline for completeness but don't
// represent dedicated project filters (Amplitude, Power BI, Git, Looker Studio).
const PROJECT_FILTER_EXCLUDE = new Set(['Amplitude', 'Power BI', 'Git', 'Looker Studio']);
const ALL_TAGS = (() => {
  const seen = new Set();
  const tags = ['All'];
  PIPELINE_STAGES.forEach(stage => {
    stage.tools.forEach(tool => {
      if (PROJECT_FILTER_EXCLUDE.has(tool.name)) return;
      if (!seen.has(tool.name)) {
        seen.add(tool.name);
        tags.push(tool.name);
      }
    });
  });
  // Plus any project tag that doesn't appear in the pipeline,
  // so no project is unreachable from the filter chips.
  ALL_PROJECTS.forEach(p => p.tags.forEach(t => {
    if (PROJECT_FILTER_EXCLUDE.has(t)) return;
    if (!seen.has(t)) { seen.add(t); tags.push(t); }
  }));
  return tags;
})();

      <section id="projects">
        <div className="container">
          <h2 className="section-title">Projects</h2>
          <p style={{ fontFamily: 'system-ui', fontSize: 18, lineHeight: '29.25px', color: 'var(--text-secondary)', marginTop: 8 }}>
            Filter by technology to find relevant work.
          </p>

          {/* Filter bar */}
          <div className="filter-bar">
            {ALL_TAGS.map(tag => (
              <button
                key={tag}
                className={`filter-chip${activeFilter === tag ? ' active' : ''}`}
                onClick={() => setActiveFilter(tag)}
              >
                {tag}
              </button>
            ))}
          </div>

          {/* Grid */}
          <div className="projects-grid">
            {pagedProjects.length > 0
              ? pagedProjects.map(p => <ProjectCard key={p.num} project={p} onOpen={() => setSelectedProject(p)} />)
              : (
                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '40px 0', color: 'var(--text-dim)', fontFamily: 'system-ui', fontSize: 16 }}>
                  No projects match this filter yet.
                </div>
              )
            }
          </div>

          {/* Pagination dots */}
          {pageCount > 1 && (
            <div className="page-dots" role="tablist" aria-label="Project pages">
              <button
                className="page-arrow"
                onClick={() => setPage(p => Math.max(0, p - 1))}
                disabled={safePage === 0}
                aria-label="Previous page"
              >←</button>
              {Array.from({ length: pageCount }).map((_, i) => (
                <button
                  key={i}
                  className={`page-dot${i === safePage ? ' active' : ''}`}
                  onClick={() => setPage(i)}
                  role="tab"
                  aria-selected={i === safePage}
                  aria-label={`Page ${i + 1} of ${pageCount}`}
                />
              ))}
              <button
                className="page-arrow"
                onClick={() => setPage(p => Math.min(pageCount - 1, p + 1))}
                disabled={safePage === pageCount - 1}
                aria-label="Next page"
              >→</button>
            </div>
          )}
        </div>
      </section>

      {/* ══ CONTACT ═══════════════════════════════════════ */}
      <section id="contact">
        <div className="container">
          <div className="contact-inner">
            <a href="mailto:denislav@denev.work" className="contact-email">denislav@denev.work</a>
            <div className="contact-links">
              <a href="https://github.com/denislavdenev" target="_blank" rel="noopener noreferrer" className="btn-secondary">GitHub</a>
              <a href="https://linkedin.com/in/denislavdenev/" target="_blank" rel="noopener noreferrer" className="btn-secondary">LinkedIn</a>
              <a href="#" className="btn-secondary">Download CV</a>
            </div>
          </div>
        </div>
      </section>

      {/* ══ PROJECT MODAL ═════════════════════════════════ */}
      {selectedProject && (
        <ProjectModal project={selectedProject} onClose={() => setSelectedProject(null)} />
      )}

      {/* ══ FOOTER ════════════════════════════════════════ */}
      <footer>
        <div className="footer-copy">© 2026 Denislav Denev</div>
        <div className="footer-copy">Built with intent · GitHub Pages</div>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
