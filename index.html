<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denislav Denev · Data Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0c1220;
    --bg2:          #111827;
    --surface:      #1e293b;
    --surface2:     #243044;
    --border:       rgba(51,65,85,0.7);
    --border-blue:  rgba(59,130,246,0.4);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-dim:     #475569;
    --accent:       #3b82f6;
    --accent2:      #60a5fa;
    --accent-cyan:  #22d3ee;
    --mono: 'IBM Plex Mono', monospace;
    /* typography system */
    --font-display: 'Georgia', serif;
    --font-body:    system-ui, -apple-system, sans-serif;
    --font-label:   system-ui, -apple-system, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 29.25px;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ── Nav ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent;
    backdrop-filter: none;
    border-bottom: 0.8px solid transparent;
    transition: background 300ms ease, border-color 300ms ease, backdrop-filter 300ms ease;
  }

  /* Full name in Georgia display style */
  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: -0.025em;
    color: #f1f5f9;
    text-decoration: none;
    line-height: 28px;
  }

  .nav-links {
    display: flex;
    gap: 8px;
    list-style: none;
  }

  /* Link style from design system */
  .nav-links a {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #94a3b8;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 9999px;
    transition: color 150ms ease;
  }
  .nav-links a:hover { color: var(--accent2); }

  /* ── Shared layout ── */
  section { padding: 100px 0; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.8px;
    background: var(--border);
    max-width: 60px;
  }

  /* ── Section backgrounds — alternating pattern ── */
  #about    { background: #0c1220; }
  #pipeline { background: #0e1628; }
  #projects { background: #0c1220; }
  #contact  { background: #0e1628; }

  /* display-lg token */
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  /* ── Buttons ── */
  /* Primary: #334155 bg, #60A5FA text, pill, shadow */
  .btn-primary {
    display: inline-block;
    font-family: var(--font-label);
    font-size: 16px;
    font-weight: 500;
    line-height: 24px;
    color: #fff;
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    padding: 12px 32px;
    border-radius: 9999px;
    text-decoration: none;
    border: none;
    box-shadow: 0 0 0 0 rgba(0,0,0,0), 0 0 0 0 rgba(0,0,0,0), rgba(30,58,138,0.5) 0px 10px 15px -3px, rgba(30,58,138,0.5) 0px 4px 6px -4px;
    transition: opacity 150ms ease, transform 150ms cubic-bezier(0.4,0,0.2,1), box-shadow 150ms ease;
    cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Secondary: transparent, #60A5FA text, blue border */
  .btn-secondary {
    display: inline-block;
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #60a5fa;
    background: transparent;
    padding: 8px 24px;
    border-radius: 9999px;
    border: 0.8px solid #3b82f6;
    text-decoration: none;
    transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    cursor: pointer;
  }
  .btn-secondary:hover { background: rgba(59,130,246,0.1); box-shadow: 0 0 0 0 rgba(0,0,0,0), 0 0 0 0 rgba(0,0,0,0), rgba(0,0,0,0.2) 0 1px 2px 0; }

  /* ── Hero ── */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
    padding: 0;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 160px 48px 80px;
    max-width: 620px;
    /* left ~45% like NexusStream, ribbons own the right */
    width: 45%;
    min-width: 300px;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hero-eyebrow::before {
    content: '';
    width: 24px;
    height: 0.8px;
    background: var(--accent2);
    opacity: 0.6;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: transparent;
    background: linear-gradient(135deg, #818cf8 0%, #60a5fa 40%, #22d3ee 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
  }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 400;
    line-height: 29.25px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    max-width: 400px;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── About ── */
  .about-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }

  .about-text p {
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 29.25px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .about-text p strong { color: var(--text-primary); font-weight: 500; }

  .skills-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; margin-top: 48px; }

  .skill-group-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .skill-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  .chip {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 0.8px solid var(--border);
    padding: 4px 16px;
    border-radius: 9999px;
    transition: border-color 150ms ease, color 150ms ease;
    cursor: default;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Pipeline Section ── */

  /* ── Projects ── */

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 32px;
    margin-bottom: 32px;
  }

  .filter-chip {
    font-family: var(--font-label);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    padding: 8px 20px;
    border-radius: 9999px;
    border: 0.8px solid var(--border);
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
  }
  .filter-chip:hover { color: var(--accent2); border-color: var(--border-blue); }
  .filter-chip.active {
    background: #334155;
    color: #60a5fa;
    border-color: transparent;
    box-shadow: rgba(0,0,0,0) 0 0 0 0, rgba(0,0,0,0) 0 0 0 0, rgba(0,0,0,0.2) 0 1px 2px 0;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 0.8px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: border-color 200ms cubic-bezier(0.4,0,0.2,1), transform 200ms cubic-bezier(0.4,0,0.2,1), box-shadow 200ms cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-cyan));
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .project-card:hover {
    border-color: var(--border-blue);
    transform: translateY(-3px);
    box-shadow: 0 20px 40px -12px rgba(30,58,138,0.35);
  }
  .project-card:hover::before { opacity: 1; }

  .project-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* display font for project titles */
  .project-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    line-height: 1.3;
  }

  /* body-md for desc */
  .project-desc {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    flex: 1;
  }

  .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .project-tag {
    font-family: var(--font-label);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent2);
    background: rgba(59,130,246,0.1);
    border: 0.8px solid rgba(59,130,246,0.2);
    padding: 3px 10px;
    border-radius: 9999px;
  }

  .project-arrow {
    font-size: 18px;
    color: var(--text-dim);
    align-self: flex-end;
    transition: color 200ms ease, transform 200ms ease;
  }
  .project-card:hover .project-arrow { color: var(--accent2); transform: translate(2px,-2px); }

  .project-card.hidden { display: none; }

  /* ── Contact ── */
  #contact { text-align: center; padding: 60px 0; }

  .contact-inner { max-width: 480px; margin: 0 auto; }

  .contact-email {
    font-family: var(--font-display);
    font-size: clamp(22px, 3.5vw, 40px);
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    text-decoration: none;
    display: block;
    margin: 0 0 32px;
    transition: color 150ms ease;
  }
  .contact-email:hover { color: var(--accent2); }

  .contact-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  /* ── Footer ── */
  footer {
    border-top: 0.8px solid var(--border);
    background: #0c1220;
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-copy {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { display: none; }
    .hero-content { width: 100%; padding: 120px 24px 60px; }
    .container { padding: 0 24px; }
    section { padding: 72px 0; }
    .projects-grid { grid-template-columns: 1fr; }
    .filter-bar { gap: 6px; }
    .filter-chip { font-size: 13px; padding: 6px 14px; }
    .contact-links { flex-direction: column; align-items: center; }
    footer { padding: 20px 24px; }
  }
  @media (min-width: 769px) and (max-width: 1024px) {
    .hero-content { width: 55%; padding: 140px 40px 60px; }
    .projects-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav id="main-nav">
  <a href="#hero" class="nav-logo" id="nav-name" style="opacity:0;pointer-events:none;transition:opacity 300ms ease;">Denislav Denev</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#pipeline">Stack</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
<script>
  window.addEventListener('scroll', function() {
    var hero = document.getElementById('hero');
    var name = document.getElementById('nav-name');
    var nav  = document.getElementById('main-nav');
    if (!hero || !name) return;
    var past = window.scrollY > hero.offsetHeight * 0.7;
    name.style.opacity = past ? '1' : '0';
    name.style.pointerEvents = past ? 'auto' : 'none';
    nav.style.background = past ? 'rgba(12,18,32,0.85)' : 'transparent';
    nav.style.borderBottomColor = past ? 'rgba(51,65,85,0.7)' : 'transparent';
    nav.style.backdropFilter = past ? 'blur(12px)' : 'none';
  });
</script>

/* ─── Road Animation (SVG ribbon style) ────────────────── */
function RoadAnimation() {
  const streamRefs  = useRef([]);
  const fastRefs    = useRef([]);
  const nodeRefs    = useRef([]);
  const rafRef      = useRef(null);

  useEffect(() => {
    let offset = 0;
    let time   = 0;
    function animate() {
      offset -= 1.5;
      streamRefs.current.forEach(el => { if (el) el.style.strokeDashoffset = offset; });
      fastRefs.current.forEach(el =>   { if (el) el.style.strokeDashoffset = offset * 2.5; });
      time += 0.025;
      nodeRefs.current.forEach((el, i) => {
        if (el) el.style.transform = `translateY(${Math.sin(time + i * 2.1) * 7}px)`;
      });
      rafRef.current = requestAnimationFrame(animate);
    }
    animate();
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  const sRef  = (i) => el => { streamRefs.current[i] = el; };
  const fRef  = (i) => el => { fastRefs.current[i]   = el; };
  const nRef  = (i) => el => { nodeRefs.current[i]   = el; };

function ToolIcon({ tool, side }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'default' }}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
    >

        width: 28, height: 28,
        color: hover ? '#60a5fa' : '#64748b',
        transition: 'color 150ms ease, transform 150ms cubic-bezier(0.4,0,0.2,1)',
        transform: hover ? 'scale(1.2)' : 'scale(1)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>

      {hover && (
        <div style={{
          position: 'absolute',
          top: '50%', transform: 'translateY(-50%)',
          [side === 'left' ? 'right' : 'left']: 'calc(100% + 10px)',
          background: '#1e293b',
          border: '0.8px solid rgba(51,65,85,0.9)',
          borderRadius: 8, padding: '7px 12px',
          pointerEvents: 'none', zIndex: 300,

        </div>
      )}

  );
